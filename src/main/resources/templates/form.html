<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Todo - Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

<div class="container mx-auto py-10 px-4">
    <div class="flex flex-wrap -mx-4">

        <div class="w-full md:w-1/3 px-4 mb-8">
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <div class="bg-blue-600 px-6 py-4">
                    <h5 class="text-white font-bold text-lg">Thêm Task Mới</h5>
                </div>
                <div class="p-6">
                    <form th:action="@{/add}" th:object="${todo}" method="post" class="space-y-4">

                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2" for="content">Nội dung</label>
                            <input type="text" th:field="*{content}" id="content" name="content"
                                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   th:classappend="${#fields.hasErrors('content')} ? 'border-red-500 ring-1 ring-red-500' : 'border-gray-300'">
                            <p class="text-red-500 text-xs italic mt-1" th:if="${#fields.hasErrors('content')}"
                               th:errors="*{content}"></p>
                        </div>

                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2" for="dueDate">Hạn chót</label>
                            <input type="date" th:field="*{dueDate}" id="dueDate" name="dueDate"
                                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   th:classappend="${#fields.hasErrors('dueDate')} ? 'border-red-500 ring-1 ring-red-500' : 'border-gray-300'">
                            <p class="text-red-500 text-xs italic mt-1" th:if="${#fields.hasErrors('dueDate')}"
                               th:errors="*{dueDate}"></p>
                        </div>

                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2" for="priority">Độ ưu tiên</label>
                            <select th:field="*{priority}" id="priority" name="priority"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                                <option th:each="p : ${T(atmin.model.Priority).values()}"
                                        th:value="${p}" th:text="${p}"></option>
                            </select>
                        </div>

                        <div class="flex items-center"> 
                            <input type="checkbox" th:field="*{status}" id="status"
                                   class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <label for="status" class="ml-2 text-gray-700 text-sm font-bold">Đã hoàn thành</label>
                        </div>

                        <button type="submit"
                                class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg transition duration-300">
                            Lưu Công Việc
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="w-full md:w-2/3 px-4">
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <div class="bg-gray-800 px-6 py-4">
                    <h5 class="text-white font-bold text-lg">Danh sách công việc</h5>
                </div>
                <div class="p-4 overflow-x-auto">
                    <table class="min-w-full leading-normal">
                        <thead>
                        <tr class="bg-gray-100 border-b-2 border-gray-200">
                            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                Nội dung
                            </th>
                            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                Hạn chót
                            </th>
                            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                Ưu tiên
                            </th>
                            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                Trạng thái
                            </th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="t : ${todos}"
                            class="border-b border-gray-200 hover:bg-gray-50 transition duration-150">
                            <td class="px-5 py-4 text-sm font-medium text-gray-900" th:text="${t.content}"></td>
                            <td class="px-5 py-4 text-sm text-gray-600" th:text="${t.dueDate}"></td>
                            <td class="px-5 py-4 text-sm">
                                    <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full text-white"
                                          th:classappend="${t.priority.name() == 'HIGH' ? 'bg-red-500' : 'bg-blue-500'}"
                                          th:text="${t.priority}"></span>
                            </td>
                            <td class="px-5 py-4 text-sm">
                                <span th:if="${t.status}" class="text-green-600 font-bold">✔ Xong</span>
                                <span th:unless="${t.status}" class="text-yellow-600 font-bold">⏳ Chờ</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(todos)}">
                            <td colspan="4" class="px-5 py-10 text-center text-gray-500 italic">Chưa có công việc nào
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
